<!DOCTYPE html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>To Do List</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container">
      <h1>To Do List</h1>

      <button id="btnDark">🌙</button>

      <input type="text" id="tarefa" placeholder="Digite uma tarefa" />

      <button id="btnadicionar">Adicionar</button>
      <button id="btnLimpar">Limpar tudo</button>

      <div id="filtros">
        <button data-filtro="todas">Todas</button>
        <button data-filtro="pendentes">Pendentes</button>
        <button data-filtro="concluidas">Concluídas</button>
      </div>

      <ul id="lista"></ul>
    </div>

    <script src="script.js"></script>
  </body>
</html>
